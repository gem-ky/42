<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Поиск Аниме</title>
    <style>
        /* Темная тема оформления кинотеатра */
        body {
            background-color: #0d0d0d;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
        }
        .search-container {
            max-width: 600px;
            margin: 50px auto 30px auto;
            text-align: center;
        }
        .search-box {
            display: flex;
            gap: 10px;
        }
        .search-input {
            flex: 1;
            padding: 14px 20px;
            border-radius: 8px;
            border: 1px solid #2d2d2d;
            background-color: #1a1a1a;
            color: #ffffff;
            font-size: 16px;
            outline: none;
            transition: border-color 0.3s;
        }
        .search-input:focus {
            border-color: #ff4757;
        }
        .search-button {
            padding: 14px 28px;
            border-radius: 8px;
            border: none;
            background-color: #ff4757;
            color: #ffffff;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        .search-button:hover {
            background-color: #ff6b81;
        }
        .results-container {
            max-width: 900px;
            margin: 0 auto;
            padding: 10px;
        }
        .anime-card {
            background-color: #141414;
            border: 1px solid #222222;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 25px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.5);
        }
        .anime-title {
            font-size: 20px;
            margin-top: 0;
            margin-bottom: 15px;
            color: #ffffff;
            border-left: 4px solid #ff4757;
            padding-left: 10px;
        }
        .video-wrapper {
            position: relative;
            padding-bottom: 56.25%; /* Соотношение сторон видео 16:9 */
            height: 0;
            overflow: hidden;
            border-radius: 8px;
            background-color: #000000;
        }
        .video-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
        }
        .status-msg {
            text-align: center;
            color: #888888;
            font-size: 18px;
            margin-top: 40px;
        }
    </style>
</head>
<body>

    <!-- Шапка и поле ввода поискового запроса -->
    <div class="search-container">
        <h1 style="margin-bottom: 20px; font-weight: 400;">Поиск аниме релизов</h1>
        <div class="search-box">
            <input type="text" id="search-input" class="search-input" placeholder="Введите название аниме (например, Наруто)...">
            <button onclick="searchAnime()" class="search-button">Найти</button>
        </div>
    </div>

    <!-- Область, куда скрипт подгружает плееры -->
    <div id="anime-container" class="results-container">
        <p class="status-msg">Введите название и нажмите кнопку для поиска.</p>
    </div>

    <script>
        // Ваш личный Cloudflare Worker в качестве прокси-сервера
        const WORKER_URL = 'https://sweet-cherry-8a30.nedewlos.workers.dev'; 

        async function searchAnime() {
            const query = document.getElementById('search-input').value.trim();
            if (!query) return alert("Пожалуйста, введите название аниме.");
            
            const container = document.getElementById('anime-container');
            container.innerHTML = '<p class="status-msg" style="color: #ff4757;">Ищем аниме в базе данных...</p>';

            try {
                // Вызываем ваш воркер, передавая название аниме в параметрах
                const response = await fetch(`${WORKER_URL}?title=${encodeURIComponent(query)}`);
                const data = await response.json();
                
                if (data.results && data.results.length > 0) {
                    renderAnimeList(data.results); 
                } else {
                    container.innerHTML = '<p class="status-msg">Ничего не найдено. Попробуйте изменить запрос.</p>';
                }
            } catch (error) {
                console.error("Ошибка сети при обращении к Воркеру:", error);
                container.innerHTML = '<p class="status-msg" style="color: #ff4757;">Ошибка соединения с сервером. Убедитесь, что Воркер задеплоен и в нем нет ошибок кода.</p>';
            }
        }

        function renderAnimeList(animeArray) {
            const container = document.getElementById('anime-container'); 
            container.innerHTML = ''; // Стираем сообщение статуса
            
            animeArray.forEach(anime => {
                // Если у аниме нет ссылки на плеер, пропускаем этот элемент
                if (!anime.player_link) return;

                const card = document.createElement('div');
                card.className = 'anime-card';
                
                // Генерируем HTML карточки со встроенным iframe-плеером Kodik
                card.innerHTML = `
                    <h2 class="anime-title">${anime.title}</h2>
                    <div class="video-wrapper">
                        <iframe 
                            src="${anime.player_link}" 
                            allowfullscreen>
                        </iframe>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        // Поиск срабатывает автоматически при нажатии клавиши Enter в поле ввода
        document.getElementById('search-input').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                searchAnime();
            }
        });
    </script>
</body>
</html>
