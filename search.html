<script>
    // Ваш прокси-воркер
    const PROXY_URL = 'https://workers.dev'; 
    // Свежий рабочий токен базы Kodik
    const KODIK_TOKEN = '049379ee07908b884976c66903f16d7a'; 

    async function searchAnime() {
        const query = document.getElementById('search-input').value.trim();
        if (!query) return alert("Пожалуйста, введите название.");
        
        const container = document.getElementById('anime-container');
        container.innerHTML = '<p class="status-msg" style="color: #ff4757;">Поиск релизов...</p>';

        try {
            // Формируем чистый URL без лишних кодирований для передачи в прокси
            const targetUrl = `https://kodik-api.com{KODIK_TOKEN}&title=${query}&limit=10&with_material_data=true`;
            
            // Запрашиваем данные через ваш Cloudflare Worker
            const response = await fetch(`${PROXY_URL}${encodeURIComponent(targetUrl)}`);
            const data = await response.json();
            
            if (data.results && data.results.length > 0) {
                renderAnimeList(data.results); 
            } else {
                container.innerHTML = '<p class="status-msg">Ничего не найдено.</p>';
            }
        } catch (error) {
            console.error("Ошибка:", error);
            container.innerHTML = '<p class="status-msg" style="color: #ff4757;">Ошибка сети при поиске.</p>';
        }
    }

    function renderAnimeList(animeArray) {
        const container = document.getElementById('anime-container'); 
        container.innerHTML = '';
        
        animeArray.forEach(anime => {
            if (!anime.player_link) return;

            const card = document.createElement('div');
            card.className = 'anime-card';
            card.innerHTML = `
                <h2 class="anime-title">${anime.title}</h2>
                <div class="video-wrapper">
                    <iframe src="${anime.player_link}" allowfullscreen></iframe>
                </div>
            `;
            container.appendChild(card);
        });
    }

    document.getElementById('search-input').addEventListener('keypress', function (e) {
        if (e.key === 'Enter') searchAnime();
    });
</script>
