<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Поиск Аниме</title>
    <style>
        body {
            background-color: #0d0d0d;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
        }
        .search-container {
            max-width: 600px;
            margin: 50px auto 30px auto;
            text-align: center;
        }
        .search-box {
            display: flex;
            gap: 10px;
        }
        .search-input {
            flex: 1;
            padding: 14px 20px;
            border-radius: 8px;
            border: 1px solid #2d2d2d;
            background-color: #1a1a1a;
            color: #ffffff;
            font-size: 16px;
            outline: none;
        }
        .search-input:focus { border-color: #ff4757; }
        .search-button {
            padding: 14px 28px;
            border-radius: 8px;
            border: none;
            background-color: #ff4757;
            color: #ffffff;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }
        .results-container {
            max-width: 900px;
            margin: 0 auto;
        }
        .anime-card {
            background-color: #141414;
            border: 1px solid #222222;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 25px;
        }
        .anime-title {
            font-size: 20px;
            margin: 0 0 15px 0;
            border-left: 4px solid #ff4757;
            padding-left: 10px;
        }
        .video-wrapper {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            overflow: hidden;
            border-radius: 8px;
        }
        .video-wrapper iframe {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%; border: 0;
        }
        .status-msg {
            text-align: center; color: #888888; font-size: 18px; margin-top: 40px;
        }
    </style>
</head>
<body>

    <div class="search-container">
        <h1 style="margin-bottom: 20px; font-weight: 400;">Поиск аниме</h1>
        <div class="search-box">
            <input type="text" id="search-input" class="search-input" placeholder="Введите название аниме...">
            <button onclick="searchAnime()" class="search-button">Найти</button>
        </div>
    </div>

    <div id="anime-container" class="results-container">
        <p class="status-msg">Введите название для поиска.</p>
    </div>

    <script>
        // Ваш неизмененный Воркер, выполняющий роль прокси
        const PROXY_URL = 'https://workers.dev'; 
        // Рабочий токен для базы Kodik
        const KODIK_TOKEN = '049379ee07908b884976c66903f16d7a'; 

        async function searchAnime() {
            const query = document.getElementById('search-input').value.trim();
            if (!query) return alert("Пожалуйста, введите название.");
            
            const container = document.getElementById('anime-container');
            container.innerHTML = '<p class="status-msg" style="color: #ff4757;">Поиск релизов...</p>';

            try {
                // Напрямую генерируем целевой URL для Kodik через ваш прокси
                const targetUrl = `https://kodik-api.com{KODIK_TOKEN}&title=${encodeURIComponent(query)}&limit=10&with_material_data=true`;
                
                // Отправляем запрос в воркер, передавая целевой сайт в параметр `url`
                const response = await fetch(`${PROXY_URL}${encodeURIComponent(targetUrl)}`);
                const data = await response.json();
                
                if (data.results && data.results.length > 0) {
                    renderAnimeList(data.results); 
                } else {
                    container.innerHTML = '<p class="status-msg">Ничего не найдено.</p>';
                }
            } catch (error) {
                console.error(error);
                container.innerHTML = '<p class="status-msg" style="color: #ff4757;">Ошибка сети при поиске.</p>';
            }
        }

        function renderAnimeList(animeArray) {
            const container = document.getElementById('anime-container'); 
            container.innerHTML = '';
            
            animeArray.forEach(anime => {
                if (!anime.player_link) return;

                const card = document.createElement('div');
                card.className = 'anime-card';
                card.innerHTML = `
                    <h2 class="anime-title">${anime.title}</h2>
                    <div class="video-wrapper">
                        <iframe src="${anime.player_link}" allowfullscreen></iframe>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        document.getElementById('search-input').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') searchAnime();
        });
    </script>
</body>
</html>
