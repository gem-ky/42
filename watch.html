<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Просмотр Аниме</title>
    <style>
        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: #141414;
            color: #ffffff;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .main-title {
            font-size: 26px;
            margin-bottom: 20px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
            text-align: center;
        }
        .player-container {
            width: 100%;
            max-width: 900px;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0,0,0,0.8);
            position: relative;
            padding-top: 56.25%; 
        }
        .player-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }
        .error-message {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #ff4a4a;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h1 class="main-title" id="video-title">Загрузка...</h1>

    <div class="player-container" id="player-box">
        <!-- Сюда встроится рабочий плеер Alloha -->
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Читаем ID и Название из ссылки (например: watch.html?id=21445&title=Наруто)
            const urlParams = new URLSearchParams(window.location.search);
            let animeId = urlParams.get('id'); 
            const animeTitle = urlParams.get('title') || "Просмотр Аниме"; 

            const container = document.getElementById('player-box');

            if (animeId) {
                // Меняем заголовок на название аниме
                document.getElementById('video-title').innerText = decodeURIComponent(animeTitle);
                
                // Очищаем префикс 'serial-', если вы случайно передали его из старого кода
                animeId = animeId.replace('serial-', '');

                // Используем стабильный плеер базы Alloha по Кинопоиск ID (для Наруто это 21445)
                const playerUrl = `https://alloha.tv{animeId}`;

                container.innerHTML = `
                    <iframe 
                        src="${playerUrl}" 
                        width="100%" 
                        height="100%" 
                        allowfullscreen 
                        allow="autoplay; fullscreen">
                    </iframe>`;
            } else {
                document.getElementById('video-title').innerText = "Ошибка";
                container.innerHTML = `<div class="error-message">Аниме не выбрано. Вернитесь на главную страницу.</div>`;
            }
        });
    </script>
</body>
</html>
