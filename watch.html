<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Просмотр — СЕАНС</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0F0B14">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav class="topnav">
  <div class="wrap">
    <a class="brand" href="index.html">СЕАНС<span class="dot">.</span></a>
    <div class="navlinks">
      <a href="index.html" data-page="home">Главная</a>
      <a href="search.html" data-page="search">Каталог</a>
      <a href="profile.html" data-page="profile">Моё</a>
      <a href="settings.html" data-page="settings">Настройки</a>
    </div>
    <div class="navsearch">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg>
      <input id="navSearchInput" type="text" placeholder="Найти аниме…">
    </div>
  </div>
</nav>

<main class="wrap" id="content" style="padding-bottom:60px;">
  <div class="notice" style="margin-top:36px;">Загрузка…</div>
</main>

<script src="js/api.js"></script>
<script src="js/app.js"></script>
<script>
initNav('search');

const id = qs('id');
let ep = parseInt(qs('ep') || '1', 10);
const content = document.getElementById('content');

function setEpisodeParam(n){
  const url = new URL(location.href);
  url.searchParams.set('ep', n);
  history.replaceState(null, '', url);
}

async function main(){
  if(!id){ content.innerHTML = `<div class="notice">Тайтл не указан.</div>`; return; }

  const anime = await Shiki.byId(id).catch(()=>null);
  const title = anime ? (anime.russian || anime.name) : ('Тайтл #' + id);
  const episodesTotal = anime ? (anime.episodes || anime.episodes_aired || 1) : 1;

  const manualUrl = Library.manualLink(id, ep);

  // manual link takes priority — works with zero external API dependency
  if(manualUrl){
    renderPlayer(title, episodesTotal, manualUrl, true);
    Library.markWatched(id, ep, anime ? { russian: anime.russian, name: anime.name, image: anime.image } : null);
    return;
  }

  if(!Kodik.hasToken()){
    content.innerHTML = `
      <h1 class="detail-title" style="margin-top:32px;">${escapeHtml(title)}</h1>
      <div class="notice">
        Чтобы смотреть через Kodik, нужен личный API-токен (страница <a href="settings.html">Настройки</a>).
        Либо укажи свою ссылку на плеер прямо здесь, без токена:
      </div>
      ${manualLinkForm()}`;
    wireManualLinkForm(title, episodesTotal);
    return;
  }

  let sources;
  try{
    sources = await Kodik.findByShikimoriId(id);
  }catch(e){
    content.innerHTML = `
      <h1 class="detail-title" style="margin-top:32px;">${escapeHtml(title)}</h1>
      <div class="notice">Не удалось получить данные от Kodik. Можно указать свою ссылку на плеер вместо этого:</div>
      ${manualLinkForm()}`;
    wireManualLinkForm(title, episodesTotal);
    console.error(e);
    return;
  }

  if(!sources.length){
    content.innerHTML = `
      <h1 class="detail-title" style="margin-top:32px;">${escapeHtml(title)}</h1>
      <div class="notice">По этому тайтлу источников на Kodik не нашлось. Можно указать свою ссылку на плеер:</div>
      ${manualLinkForm()}`;
    wireManualLinkForm(title, episodesTotal);
    return;
  }

  const result = sources[0];
  const embed = Kodik.embedUrl(result, ep);
  renderPlayer(title, episodesTotal, embed, false, result);
  Library.markWatched(id, ep, { russian: anime.russian, name: anime.name, image: anime.image });
}

function manualLinkForm(){
  return `
    <div class="form-row" style="margin-top:18px;">
      <label for="manualLinkInput">Ссылка на iframe-плеер для серии ${ep}</label>
      <input type="text" id="manualLinkInput" placeholder="https://...">
      <div class="form-hint">Вставь адрес из атрибута src чужого видео-плеера (iframe). Сохранится только в этом браузере, отдельно для каждой серии.</div>
    </div>
    <button class="btn btn-primary" id="manualLinkSave">Сохранить и смотреть</button>`;
}

function wireManualLinkForm(title, episodesTotal){
  document.getElementById('manualLinkSave').onclick = () => {
    const val = document.getElementById('manualLinkInput').value.trim();
    if(!val) return;
    Library.setManualLink(id, ep, val);
    renderPlayer(title, episodesTotal, val, true);
    Library.markWatched(id, ep, null);
  };
}

function renderPlayer(title, episodesTotal, embed, isManual, result){
  let pills = '';
  for(let n=1; n<=episodesTotal; n++){
    pills += `<span class="ep-pill ${n===ep?'active':''}" data-ep="${n}">${n}</span>`;
  }

  content.innerHTML = `
    <div class="eyebrow" style="margin-top:32px;">${escapeHtml(title)} · серия ${ep}${isManual ? ' · своя ссылка' : ''}</div>
    <div class="player-shell">
      <iframe id="playerFrame" src="${embed}" allow="autoplay; fullscreen" allowfullscreen></iframe>
    </div>
    <div class="player-bar">
      <div class="ep-switcher" id="epSwitcher">${pills}</div>
      <div style="display:flex; gap:10px;">
        ${isManual ? `<button class="btn btn-ghost" id="changeManualLink">Заменить ссылку</button>` : ''}
        <a class="btn btn-ghost" href="anime.html?id=${id}">К описанию</a>
      </div>
    </div>
  `;

  document.getElementById('epSwitcher').addEventListener('click', e=>{
    const pill = e.target.closest('.ep-pill');
    if(!pill) return;
    const n = parseInt(pill.dataset.ep, 10);
    setEpisodeParam(n);
    location.reload();
  });

  if(isManual){
    document.getElementById('changeManualLink').onclick = () => {
      content.insertAdjacentHTML('beforeend', manualLinkForm());
      wireManualLinkForm(title, episodesTotal);
    };
  }
}
main();
</script>
</body>
</html>
